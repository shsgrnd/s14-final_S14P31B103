name: Jira Auto Comment

on:
  pull_request:
    types: [opened, closed] # PR이 열릴 때와 머지/닫힐 때 알림을 답니다.

permissions: {}

jobs:
  comment-to-jira:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Extract Jira Issue Key and Add Comment
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          set -euo pipefail

          # 1. PR 제목이나 브랜치명에서 Jira 이슈 키 추출 (특정 프로젝트 키만 허용)
          ISSUE_KEY=$(echo -e "${PR_TITLE}\n${BRANCH_NAME}" | grep -oE 'S14P-[0-9]+' | head -n 1 || true)
          
          if [ -z "$ISSUE_KEY" ]; then
            echo "PR 제목이나 브랜치 이름에서 허용된 Jira 이슈 키를 찾을 수 없습니다."
            exit 0
          fi
          
          echo "발견된 지라 이슈 키: $ISSUE_KEY"
          
          # 2. 액션 상태에 따른 댓글 내용 포맷팅 설정
          if [ "$ACTION" = "opened" ]; then
            COMMENT_BODY="🚀 새로운 GitHub PR이 열렸습니다!\n[👉 PR 내용 확인하기|${PR_URL}]"
          elif [ "$ACTION" = "closed" ]; then
            if [ "$MERGED" = "true" ]; then
               COMMENT_BODY="🎉 PR 코드가 성공적으로 Merge 되었습니다.\n[👉 반영 확인하기|${PR_URL}]"
            else
               COMMENT_BODY="❌ PR이 합쳐지지 않고 닫혔습니다.\n[👉 내용 확인하기|${PR_URL}]"
            fi
          else
            echo "지원하지 않는 액션입니다: $ACTION"
            exit 0
          fi
          
          # 3. JSON Payload 생성 (jq 사용으로 문자열 escape 이슈 방지)
          PAYLOAD=$(jq -n --arg body "$COMMENT_BODY" '{body: $body}')
          
          # 4. JIRA_BASE_URL 검증 및 엔드포인트 구성
          if [[ ! "$JIRA_BASE_URL" =~ ^https?://[^/]+ ]]; then
            echo "❌ 유효하지 않은 JIRA_BASE_URL 형식입니다: $JIRA_BASE_URL"
            exit 1
          fi
          BASE_URL=$(echo "$JIRA_BASE_URL" | grep -oE '^https?://[^/]+')
          API_ENDPOINT="${BASE_URL}/rest/api/2/issue/${ISSUE_KEY}/comment"
          
          # 5. curl 요청 (에러 처리 개선, 기본 인증 사용)
          echo "지라로 댓글 전송 중... (API: $API_ENDPOINT)"
          
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o response.txt -X POST \
            -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$API_ENDPOINT")
            
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ 지라 댓글 전송 성공 (상태 코드: $HTTP_STATUS)"
          else
            echo "❌ 지라 댓글 전송 실패 (상태 코드: $HTTP_STATUS)"
            cat response.txt || true
            exit 1
          fi
